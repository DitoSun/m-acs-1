name: Bug Report
description: 报告安装或使用中的问题
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你花时间填写这个报告。请尽可能详细描述你遇到的问题。

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 发生了什么？期望什么行为？
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 如何操作导致了这个错误？
      placeholder: |
        1. 运行 sudo ./install.sh
        2. 看到 ...
        3. 然后 ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 安装日志 / 错误输出
      description: 如果有错误输出，请粘贴在这里
      render: shell

  - type: input
    id: os
    attributes:
      label: 操作系统版本
      description: 运行 cat /etc/os-release 查看
      placeholder: Ubuntu 24.04

  - type: input
    id: gpu
    attributes:
      label: 显卡型号
      description: 运行 nvidia-smi --query-gpu=name --format=csv,noheader 查看
      placeholder: NVIDIA GeForce RTX 4090

  - type: input
    id: driver
    attributes:
      label: NVIDIA 驱动版本
      description: 运行 nvidia-smi --query-gpu=driver_version --format=csv,noheader 查看
      placeholder: 550.54.15

  - type: input
    id: memory
    attributes:
      label: 内存大小
      description: 运行 free -h | grep Mem | awk '{print $2}' 查看
      placeholder: 32 GB

  - type: input
    id: network
    attributes:
      label: 网络环境
      description: 中国大陆 / 海外 / 其他
      placeholder: 中国大陆

  - type: textarea
    id: docker_status
    attributes:
      label: Docker 容器状态
      description: 运行 cd /opt/m-acs-1 && docker compose ps 查看
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: 其他信息
      description: 任何你认为可能有用的信息
